<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinRAG — Document Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #F4F7F8;
    --panel:     #FFFFFF;
    --surface:   #EEF3F5;
    --surface2:  #E5EDF0;

    --border:    #D6E4E8;
    --border2:   #C2D6DC;

    --teal:      #3A9E9A;
    --teal-d:    #2C7A77;
    --teal-l:    #5BB8B4;
    --teal-bg:   #EAF5F4;
    --teal-txt:  #2A7572;

    --text:      #1A2E30;
    --text2:     #4A6B70;
    --muted:     #8AABAF;

    --green:     #2E8B6B;
    --green-bg:  #E8F5F0;
    --red:       #B05555;

    --sans:      'Inter', sans-serif;
    --mono:      'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.65;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    grid-template-areas:
      "topbar topbar"
      "sidebar main";
  }

  /* ── Topbar ── */
  .topbar {
    grid-area: topbar;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 32px;
    gap: 16px;
    background: var(--panel);
  }
  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--teal-d);
  }
  .topbar-logo svg { width: 20px; height: 20px; }
  .topbar-divider { width: 1px; height: 20px; background: var(--border); }
  .topbar-tag { font-size: 12px; color: var(--muted); font-weight: 400; }
  .topbar-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.07em;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border2);
    transition: background 0.4s;
  }
  .status-dot.ready   { background: var(--green); }
  .status-dot.loading { background: var(--teal); animation: blink 1.1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ── Sidebar ── */
  .sidebar {
    grid-area: sidebar;
    border-right: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-inner {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: 10px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--bg);
    display: block;
  }
  .drop-zone:hover    { border-color: var(--teal-l); background: var(--teal-bg); }
  .drop-zone.dragging { border-color: var(--teal);   background: var(--teal-bg); }
  .drop-zone.has-file { border-color: var(--teal);   background: var(--teal-bg); border-style: solid; }

  .drop-icon { color: var(--muted); margin-bottom: 10px; }
  .drop-zone:hover .drop-icon,
  .drop-zone.has-file .drop-icon { color: var(--teal); }
  .drop-primary  { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
  .drop-secondary{ font-size: 12px; color: var(--muted); }
  .drop-filename {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--teal-d);
    font-weight: 500;
    margin-top: 10px;
    word-break: break-all;
  }
  input[type=file] { display: none; }

  .btn-index {
    width: 100%;
    padding: 11px 0;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-index:hover:not(:disabled) { background: var(--teal-d); }
  .btn-index:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Log */
  .log-header {
    padding: 20px 24px 10px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .log-area {
    flex: 1;
    padding: 0 24px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .log-area::-webkit-scrollbar { width: 3px; }
  .log-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .log-entry {
    display: flex;
    gap: 10px;
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.55;
  }
  .log-time  { color: var(--muted); flex-shrink: 0; }
  .log-msg   { color: var(--text2); }
  .log-msg.ok   { color: var(--green); }
  .log-msg.warn { color: var(--teal-d); }
  .log-msg.err  { color: var(--red); }

  /* Stats */
  .chunk-stat {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .stat-val {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 300;
    color: var(--teal);
    letter-spacing: -0.02em;
  }

  /* ── Main ── */
  .main {
    grid-area: main;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .conversation {
    flex: 1;
    overflow-y: auto;
    padding: 48px 80px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    scroll-behavior: smooth;
  }
  .conversation::-webkit-scrollbar { width: 4px; }
  .conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px;
  }
  .empty-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    color: var(--muted);
  }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
  .empty-body  { font-size: 13px; color: var(--muted); max-width: 320px; line-height: 1.75; }

  /* QA */
  .qa-block { display: flex; flex-direction: column; gap: 14px; }

  .q-bubble {
    align-self: flex-end;
    max-width: 65%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px 14px 3px 14px;
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
  }
  .q-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin-bottom: 7px;
    text-transform: uppercase;
  }

  .a-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--teal-l);
    border-radius: 3px 12px 12px 3px;
    overflow: hidden;
  }
  .a-card-header {
    padding: 10px 18px;
    background: var(--teal-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .a-card-header .doc-ref { color: var(--teal-d); font-weight: 500; }
  .a-card-header .spacer { flex: 1; }

  .a-card-body {
    padding: 20px 20px;
    font-size: 14px;
    line-height: 1.85;
    color: var(--text);
  }
  .a-card-footer {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .page-chip {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--teal-d);
    background: var(--teal-bg);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 3px 9px;
    font-weight: 500;
  }
  .token-chip {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
    margin-left: auto;
  }

  /* Skeleton */
  .skeleton-line {
    height: 12px; border-radius: 4px;
    background: var(--surface);
    margin-bottom: 10px;
    overflow: hidden;
    position: relative;
  }
  .skeleton-line::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

  /* Typewriter cursor */
  .tw-cursor {
    display: inline-block;
    width: 2px; height: 15px;
    background: var(--teal);
    vertical-align: middle;
    margin-left: 2px;
    border-radius: 1px;
    animation: cur 0.8s ease-in-out infinite;
  }
  @keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Input bar ── */
  .input-bar {
    border-top: 1px solid var(--border);
    padding: 20px 80px;
    background: var(--panel);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .input-wrap {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    transition: border-color 0.15s;
    position: relative;
  }
  .input-wrap:focus-within { border-color: var(--teal-l); }
  .input-prefix {
    position: absolute; top: 12px; left: 14px;
    font-family: var(--mono);
    font-size: 12px; color: var(--teal-l);
    pointer-events: none; user-select: none;
  }
  .q-input {
    width: 100%;
    background: transparent;
    border: none; outline: none;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    padding: 12px 14px 12px 48px;
    resize: none;
    line-height: 1.6;
    max-height: 130px;
    overflow-y: auto;
  }
  .q-input::placeholder { color: var(--muted); }
  .input-hint {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.06em;
    padding: 5px 14px 0;
  }
  .btn-send {
    flex-shrink: 0;
    width: 46px; height: 44px;
    background: var(--teal);
    border: none; border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, opacity 0.15s;
    color: #fff;
  }
  .btn-send:hover:not(:disabled) { background: var(--teal-d); }
  .btn-send:disabled { opacity: 0.25; cursor: not-allowed; }
  .btn-send svg { width: 17px; height: 17px; }
</style>
</head>
<body>
<div class="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="16" height="16" rx="3"/>
        <path d="M5 14L8.5 9 12 11.5 15.5 6"/>
        <circle cx="15.5" cy="6" r="1.4" fill="currentColor" stroke="none"/>
      </svg>
      FinRAG
    </div>
    <div class="topbar-divider"></div>
    <span class="topbar-tag">Document Intelligence</span>
    <div class="topbar-status">
      <div class="status-dot" id="globalDot"></div>
      <span id="globalStatus">IDLE</span>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-inner">
      <div class="section-label">Document</div>
      <label class="drop-zone" id="dropZone" for="fileInput">
        <div class="drop-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <polyline points="9 15 12 12 15 15"/>
          </svg>
        </div>
        <div class="drop-primary" id="dropPrimary">Drop a PDF here</div>
        <div class="drop-secondary" id="dropSecondary">or click to browse</div>
        <div class="drop-filename" id="dropFilename"></div>
      </label>
      <input type="file" id="fileInput" accept=".pdf">
      <button class="btn-index" id="indexBtn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span id="indexBtnText">Index Document</span>
      </button>
    </div>

    <div class="log-header">System log</div>
    <div class="log-area" id="logArea">
      <div class="log-entry">
        <span class="log-time" id="initTime"></span>
        <span class="log-msg">System ready. Awaiting document.</span>
      </div>
    </div>

    <div class="chunk-stat">
      <div>
        <div class="stat-label">Chunks</div>
        <div class="stat-val" id="chunkCount">—</div>
      </div>
      <div style="text-align:right">
        <div class="stat-label">Pages</div>
        <div class="stat-val" id="pageCount">—</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="conversation" id="conversation">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <div class="empty-title">No document loaded</div>
        <div class="empty-body">Upload an earnings report, annual filing, or financial PDF to start querying with cited answers.</div>
      </div>
    </div>

    <div class="input-bar">
      <div style="flex:1;">
        <div class="input-wrap">
          <span class="input-prefix">&gt;_</span>
          <textarea class="q-input" id="qInput" rows="1" placeholder="What was revenue growth in Q3? What are the key risk factors?" disabled></textarea>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
      <button class="btn-send" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </main>

</div>
<script>
let indexed = false, selectedFile = null, isLoading = false;

function now() {
  return new Date().toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
function addLog(msg, type='') {
  const log = document.getElementById('logArea');
  const e = document.createElement('div');
  e.className = 'log-entry';
  e.innerHTML = `<span class="log-time">${now()}</span><span class="log-msg ${type}">${msg}</span>`;
  log.appendChild(e);
  log.scrollTop = log.scrollHeight;
}
function setStatus(state) {
  document.getElementById('globalDot').className = 'status-dot ' + state;
  document.getElementById('globalStatus').textContent = state ? state.toUpperCase() : 'IDLE';
}
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 130) + 'px';
}

const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragging');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') handleFile(f);
  else addLog('Only PDF files are supported.', 'err');
});

function handleFile(f) {
  if (!f) return;
  selectedFile = f;
  dropZone.classList.add('has-file');
  document.getElementById('dropPrimary').textContent = 'PDF selected';
  document.getElementById('dropSecondary').textContent = (f.size / 1024).toFixed(0) + ' KB';
  document.getElementById('dropFilename').textContent = f.name;
  document.getElementById('indexBtn').disabled = false;
  indexed = false;
  document.getElementById('qInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  addLog(`File selected: ${f.name}`, 'warn');
  setStatus('');
}

document.getElementById('indexBtn').addEventListener('click', async () => {
  if (!selectedFile || isLoading) return;
  const btn = document.getElementById('indexBtn');
  btn.disabled = true;
  document.getElementById('indexBtnText').textContent = 'Indexing…';
  setStatus('loading');
  addLog('Clearing vector store…', 'warn');

  // ── Replace with real fetch ───────────────────────────────────────────────
  // const form = new FormData();
  // form.append('file', selectedFile);
  // const res = await fetch('http://localhost:8000/index', { method: 'POST', body: form });
  // const { chunks, pages } = await res.json();
  // ─────────────────────────────────────────────────────────────────────────
  await delay(600);  addLog('Loading PDF pages…');
  await delay(500);  addLog('Chunking text (512 tok, 64 overlap)…');
  await delay(650);  addLog('Generating embeddings…');
  await delay(750);  addLog('Upserting to vector store…');
  await delay(400);
  const fakeChunks = Math.floor(Math.random() * 60) + 80;
  const fakePages  = Math.floor(fakeChunks / 4.5);
  // ─────────────────────────────────────────────────────────────────────────

  document.getElementById('chunkCount').textContent = fakeChunks;
  document.getElementById('pageCount').textContent  = fakePages;
  addLog(`Indexed ${fakeChunks} chunks across ${fakePages} pages.`, 'ok');
  indexed = true;
  btn.disabled = false;
  document.getElementById('indexBtnText').textContent = 'Re-index Document';
  document.getElementById('qInput').disabled  = false;
  document.getElementById('sendBtn').disabled = false;
  setStatus('ready');
  document.getElementById('qInput').focus();

  const empty = document.getElementById('emptyState');
  if (empty) {
    empty.innerHTML = `
      <div class="empty-icon" style="border-color:var(--teal-l);color:var(--teal);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="empty-title" style="color:var(--teal-d);">Document ready</div>
      <div class="empty-body">Ask about revenue, margins, risk factors, guidance, or any content from the indexed PDF.</div>`;
  }
});

const qInput = document.getElementById('qInput');
const sendBtn = document.getElementById('sendBtn');
const conversation = document.getElementById('conversation');

qInput.addEventListener('input', () => autoResize(qInput));
qInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAsk(); }
});
sendBtn.addEventListener('click', handleAsk);

async function handleAsk() {
  const q = qInput.value.trim();
  if (!q || !indexed || isLoading) return;
  isLoading = true;
  qInput.value = ''; autoResize(qInput);
  qInput.disabled = true; sendBtn.disabled = true;
  setStatus('loading');

  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const block = document.createElement('div');
  block.className = 'qa-block';
  const qBubble = document.createElement('div');
  qBubble.className = 'q-bubble';
  qBubble.innerHTML = `<div class="q-label">Query · ${now()}</div>${escHtml(q)}`;
  block.appendChild(qBubble);
  conversation.appendChild(block);
  conversation.scrollTop = conversation.scrollHeight;

  const aCard = document.createElement('div');
  aCard.className = 'a-card';
  aCard.innerHTML = `
    <div class="a-card-header">
      <span class="doc-ref">Retrieving</span>
      <span class="spacer"></span>
      <span>Reranking chunks…</span>
    </div>
    <div class="a-card-body">
      <div class="skeleton-line" style="width:88%"></div>
      <div class="skeleton-line" style="width:72%"></div>
      <div class="skeleton-line" style="width:80%"></div>
      <div class="skeleton-line" style="width:55%"></div>
    </div>`;
  block.appendChild(aCard);
  conversation.scrollTop = conversation.scrollHeight;
  addLog(`Query: "${q.substring(0,50)}${q.length>50?'…':''}"`, 'warn');

  // ── Replace with real fetch ───────────────────────────────────────────────
  // const res = await fetch('http://localhost:8000/ask', {
  //   method: 'POST', headers: {'Content-Type':'application/json'},
  //   body: JSON.stringify({ question: q })
  // });
  // const result = await res.json(); // { answer, pages_referenced, tokens_used }
  // ─────────────────────────────────────────────────────────────────────────
  await delay(1900);
  const SAMPLES = [
    { answer: "Revenue for the quarter reached $4.2B, representing 12% year-over-year growth. Cloud segment revenue grew 31% to $1.8B, while legacy hardware declined 4% to $890M. The strong cloud performance was attributed to enterprise contract expansions and new logo additions in the APAC region.", pages: [14, 15], tokens: 812 },
    { answer: "Management provided full-year guidance of $17.0–17.4B in revenue, implying 9–11% growth versus prior year. Non-GAAP EPS guidance was set at $6.80–$7.10. Key headwinds include an estimated 2% FX drag and ongoing supply chain normalization in the hardware segment.", pages: [3, 8, 9], tokens: 641 },
    { answer: "Free cash flow was $1.1B for the period, up from $780M in the comparable prior-year quarter. Capital expenditures of $340M were concentrated in data center build-out. The company repurchased $500M in common stock and ended the period with a net cash balance of $2.3B.", pages: [19, 20], tokens: 755 },
    { answer: "The company cited three primary risk factors: (1) macroeconomic uncertainty affecting enterprise IT spend, (2) intensifying competition in cloud infrastructure from hyperscalers, and (3) regulatory scrutiny across key European markets. These risks are partially mitigated by a diversified customer base across 42 countries.", pages: [6, 7], tokens: 690 },
  ];
  const result = SAMPLES[Math.floor(Math.random() * SAMPLES.length)];
  // ─────────────────────────────────────────────────────────────────────────

  addLog(`Retrieved ${result.pages.length} pages. Generating answer…`);
  await delay(300);

  aCard.innerHTML = `
    <div class="a-card-header">
      <span class="doc-ref">Analysis</span>
      <span class="spacer"></span>
      <span>Pages ${result.pages.join(', ')} · ${result.tokens} tokens</span>
    </div>
    <div class="a-card-body" id="answerBody"></div>
    <div class="a-card-footer" id="answerFooter" style="display:none">
      ${result.pages.map(p=>`<span class="page-chip">p. ${p}</span>`).join('')}
      <span class="token-chip">${result.tokens} tok</span>
    </div>`;

  const answerBody = document.getElementById('answerBody');
  conversation.scrollTop = conversation.scrollHeight;
  await typewrite(answerBody, result.answer);
  document.getElementById('answerFooter').style.display = 'flex';
  addLog(`Answer rendered. ${result.tokens} tokens used.`, 'ok');

  isLoading = false;
  qInput.disabled = false; sendBtn.disabled = false;
  setStatus('ready');
  qInput.focus();
  conversation.scrollTop = conversation.scrollHeight;
}

async function typewrite(el, text) {
  const cursor = document.createElement('span');
  cursor.className = 'tw-cursor';
  el.appendChild(cursor);
  for (let i = 0; i < text.length; i++) {
    el.insertBefore(document.createTextNode(text[i]), cursor);
    await delay(text[i] === ' ' ? 17 : 15);
    if (i % 10 === 0) conversation.scrollTop = conversation.scrollHeight;
  }
  cursor.remove();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('initTime').textContent = now();
